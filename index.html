<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maintenance Loader</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0f172a;
    color: #fff;
    font-family: Arial, sans-serif;
  }

  .container {
    text-align: center;
  }

  .loader {
    width: 60px;
    height: 60px;
    border: 6px solid #334155;
    border-top: 6px solid #38bdf8;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .message {
    font-size: 20px;
    letter-spacing: 1px;
    opacity: 0;
    animation: fadeIn 2s ease forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .dots::after {
    content: '';
    display: inline-block;
    animation: dots 1.5s steps(3, end) infinite;
  }

  @keyframes dots {
    0% { content: ''; }
    33% { content: '.'; }
    66% { content: '..'; }
    100% { content: '...'; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="loader"></div>
  <div class="message">
    Portfolio is under maintenance<span class="dots"></span>
  </div>
</div>

<script>
  // Optional: dynamic message change
  const messages = [
    "Portfolio is under maintenance",
    "I'm making things awesome",
    "Be right back!"
  ];

  let index = 0;
  const messageEl = document.querySelector(".message");

  setInterval(() => {
    index = (index + 1) % messages.length;
    messageEl.childNodes[0].nodeValue = messages[index] + " ";
  }, 3000);
</script>

</body>
</html>
